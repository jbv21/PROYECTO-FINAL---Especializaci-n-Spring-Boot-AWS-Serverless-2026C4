// =============================================================================
// build.gradle -- msg-pipeline-validator-v3
// =============================================================================
// ARQUITECTURA: Hexagonal (Ports & Adapters) + Clean Architecture
//
// ROL EN v3:
//   Lambda de validacion. Es invocado SINCRONAMENTE por el Orchestrator v3.
//   Recibe el payload de la orden y devuelve { valida, motivo }.
//   No consume servicios AWS de salida (solo aplica reglas de negocio).
//
// HANDLER LAMBDA:
//   com.msgpipeline.validator.ValidatorHandler::handleRequest
//
// EMPAQUETADO PARA LAMBDA (task lambdaJar):
//   ./gradlew clean lambdaJar
//   -> build/distributions/msg-pipeline-validator-v3-lambda.zip
// =============================================================================

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.1.5'
}

group   = 'com.msgpipeline'
version = '3.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

configurations {
    compileOnly { extendsFrom annotationProcessor }
}

repositories {
    mavenCentral()
}

dependencies {
    // -- Spring Boot Core --
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // -- AWS Lambda runtime --
    implementation 'com.amazonaws:aws-lambda-java-core:1.2.3'
    implementation 'com.amazonaws:aws-lambda-java-events:3.11.4'

    // -- Utilidades --
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    compileOnly         'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // -- Tests --
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

bootJar { enabled = false }
jar     { enabled = true  }

tasks.register('lambdaJar', Zip) {
    group       = 'build'
    description  = 'Genera el ZIP de despliegue para AWS Lambda (clases en raiz + deps en lib/)'

    archiveFileName      = 'msg-pipeline-validator-v3-lambda.zip'
    destinationDirectory = layout.buildDirectory.dir('distributions')

    dependsOn compileJava, processResources

    from sourceSets.main.output
    into('lib') { from configurations.runtimeClasspath }
}

build.dependsOn lambdaJar

test { useJUnitPlatform() }
